name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Checkout + Setup Node + npm ci + cache
  # ──────────────────────────────────────────────
  checkout-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ──────────────────────────────────────────────
  # Job 2 : Lint (ESLint)
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checkout-setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────
  # Job 3 : Secrets scanning (Gitleaks)
  # ──────────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checkout-setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 4 : Dependency vulnerability check
  # ──────────────────────────────────────────────
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checkout-setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev 2>&1 | tee npm-audit-report.txt
        continue-on-error: false

      - name: Generate HTML audit report
        if: always()
        run: |
          echo "<html><head><title>npm audit report</title></head><body><pre>" > npm-audit-report.html
          cat npm-audit-report.txt >> npm-audit-report.html
          echo "</pre></body></html>" >> npm-audit-report.html

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: npm-audit-report.html
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 5 : Tests unitaires + couverture
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 6 : Coverage gate (seuil 80% lines)
  # ──────────────────────────────────────────────
  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Check coverage threshold (80% lines)
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['total']['lines']['pct'])
          ")
          echo "Line coverage: ${COVERAGE}%"
          THRESHOLD=80
          if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

  # ──────────────────────────────────────────────
  # Job 7 : SonarQube analysis
  # ──────────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload Sonar results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonar-report
          path: .scannerwork/report-task.txt
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 8 : Build application + Docker image
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: coverage-gate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (OCI format)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: catalog:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=oci,dest=catalog-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: catalog-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 9 : Image scan (Trivy)
  # ──────────────────────────────────────────────
  image-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Extract OCI image
        run: mkdir -p catalog-image && tar -xf catalog-image.tar -C catalog-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: catalog-image
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          output: trivy-report.txt

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 7
