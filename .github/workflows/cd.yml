name: CD Pipeline

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible (qualif ou prod)"
        type: choice
        options:
          - qualif
          - prod
      image_tag:
        description: "Tag de l'image à promouvoir"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Build Docker image (dev only)
  # ──────────────────────────────────────────────
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (OCI format)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: catalog:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=oci,dest=catalog-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: catalog-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2 : Image scan — Trivy (dev only)
  # ──────────────────────────────────────────────
  image-scan:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Extract OCI image
        run: mkdir -p catalog-image && tar -xf catalog-image.tar -C catalog-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: catalog-image
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table
          output: trivy-vuln-report.txt

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy misconfiguration scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          output: trivy-misconfig-report.txt

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            trivy-vuln-report.txt
            trivy-misconfig-report.txt
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3 : Push image to ACR (dev only)
  # ──────────────────────────────────────────────
  push-acr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: image-scan
    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag=${SHORT_SHA}-${BRANCH}-${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Push image to ACR
        uses: pr-mpt/actions-push-oci-archive-to-registry@v1
        with:
          archive: catalog-image.tar
          image: crformation.azurecr.io/catalog
          tag: ${{ steps.vars.outputs.tag }}

  # ──────────────────────────────────────────────
  # Job 4 : Update GitOps repo — dev (on push to main)
  # ──────────────────────────────────────────────
  update-gitops-dev:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: push-acr
    steps:
      - name: Clone gitops repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/mchekini-check-consulting/devops-formation-gitops.git

      - name: Update image tag
        run: |
          cd devops-formation-gitops
          yq -i '.image.tag = "${{ needs.push-acr.outputs.image-tag }}"' \
            environments/dev/40-applications/catalog/values.yaml

      - name: Commit and push
        run: |
          cd devops-formation-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/dev/40-applications/catalog/values.yaml
          git commit -m "chore(catalog): update dev image tag to ${{ needs.push-acr.outputs.image-tag }}"
          git push

  # ──────────────────────────────────────────────
  # Job 5 : Update GitOps repo — qualif/prod (manual dispatch)
  # ──────────────────────────────────────────────
  update-gitops-promote:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clone gitops repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/mchekini-check-consulting/devops-formation-gitops.git

      - name: Update image tag
        run: |
          cd devops-formation-gitops
          yq -i '.image.tag = "${{ inputs.image_tag }}"' \
            environments/${{ inputs.environment }}/40-applications/catalog/values.yaml

      - name: Commit and push
        run: |
          cd devops-formation-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/${{ inputs.environment }}/40-applications/catalog/values.yaml
          git commit -m "chore(catalog): update ${{ inputs.environment }} image tag to ${{ inputs.image_tag }}"
          git push
