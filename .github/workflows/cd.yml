name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qualif
          - prod
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Verify image exists in ACR
  # ──────────────────────────────────────────────
  verify-image:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify image exists in ACR
        run: |
          az acr manifest show-metadata \
            crformation.azurecr.io/catalog:${{ inputs.image_tag }} \
            --output json
          echo "Image crformation.azurecr.io/catalog:${{ inputs.image_tag }} found"

  # ──────────────────────────────────────────────
  # Job 2 : Deploy to AKS via Helm
  # ──────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Helm upgrade
        run: |
          helm upgrade catalogue \
            oci://crformation.azurecr.io/helm/catalogue \
            --install \
            --namespace ${{ inputs.environment }} \
            --create-namespace \
            -f helm/values-${{ inputs.environment }}.yaml \
            --set image.tag=${{ inputs.image_tag }} \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/catalogue \
            --namespace ${{ inputs.environment }} \
            --timeout=120s
