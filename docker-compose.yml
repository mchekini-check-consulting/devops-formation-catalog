services:
  catalogue:
    build: 
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: catalogue-service
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: catalogue_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      LOG_LEVEL: info
      SERVICE_NAME: catalog
      ENV: production
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - catalogue-net

  postgres:
    image: postgres:17-alpine
    container_name: catalogue-postgres
    environment:
      POSTGRES_DB: catalogue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - catalogue-net

volumes:
  pgdata:

networks:
  catalogue-net:
    driver: bridge
