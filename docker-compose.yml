version: '3.8'

services:
  catalogue:
    build: 
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: catalogue-service
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5434
      DB_NAME: catalogue_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - catalogue-net

  postgres:
    image: postgres:17-alpine
    container_name: catalogue-postgres
    environment:
      POSTGRES_DB: catalogue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5434'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - catalogue-net

volumes:
  pgdata:

networks:
  catalogue-net:
    driver: bridge
